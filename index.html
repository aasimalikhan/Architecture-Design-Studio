<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <script>
      // GitHub Pages SPA fallback: `public/404.html` redirects with `?redirect=`.
      // On first load, restore the intended URL before the router starts.
      (function () {
        try {
          var url = new URL(window.location.href);
          var redirect = url.searchParams.get('redirect');
          if (!redirect) return;
          url.searchParams.delete('redirect');
          var rest = url.searchParams.toString();
          var next = decodeURIComponent(redirect) + (rest ? ('?' + rest) : '') + url.hash;
          window.history.replaceState(null, '', next);
        } catch (e) {
          // no-op
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta name="description" content="NCD International — architecture and design across two continents. Raleigh, NC and Hyderabad, India." />
    <meta property="og:title" content="NCD International" />
    <meta property="og:description" content="Architecture and design across two continents." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <title>NCD International — Architecture across two continents</title>
    <link rel="stylesheet" href="%BASE_URL%src/styles/index.css" />
  </head>
  <body>
    <div id="app">
      <div class="boot-loader" id="boot-loader" aria-hidden="true">
        <div class="boot-loader__bar"></div>
      </div>

      <div class="cursor" id="cursor" aria-hidden="true"></div>
      <div class="cursor-dot" id="cursor-dot" aria-hidden="true"></div>

      <header class="nav" id="nav">
        <a class="nav__brand" href="%BASE_URL%" data-link data-route="/">
          <span class="nav__brand-mark">N</span><span class="nav__brand-name">CD International</span>
        </a>
        <nav class="nav__links" aria-label="Primary">
          <a href="%BASE_URL%about" data-link data-route="/about">About</a>
          <a href="%BASE_URL%projects" data-link data-route="/projects">Projects</a>
          <a href="%BASE_URL%references" data-link data-route="/references">References</a>
          <a href="%BASE_URL%team" data-link data-route="/team">Team</a>
          <a href="%BASE_URL%contact" data-link data-route="/contact">Contact</a>
        </nav>
      </header>

      <main id="main" class="main" tabindex="-1"></main>

      <div class="popup-stage" id="popup-stage" aria-live="polite" aria-atomic="true"></div>

      <footer class="footer">
        <span class="footer__line">All rights reserved.</span>
      </footer>
    </div>

    <script type="module" src="%BASE_URL%src/main.ts"></script>
  </body>
</html>
